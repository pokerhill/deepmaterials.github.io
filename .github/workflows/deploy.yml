name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build the static site inside the same Docker image contributors use
      # locally. `--target export` is a FROM-scratch stage in the Dockerfile
      # whose only content is /app/out, so buildx writes it straight to ./out.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build static export via Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          target: export
          outputs: type=local,dest=./out
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
